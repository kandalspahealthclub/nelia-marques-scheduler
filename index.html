
<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nélia Marques</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css?v=3">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="brand" style="cursor: pointer;" onclick="state.currentView='dashboard'; refreshCurrentView();">
                <img src="logo.png" alt="Logo" class="sidebar-logo">
            </div>
            <nav class="nav-menu">
                <button class="nav-item active" data-view="dashboard">Painel</button>
                <button class="nav-item" data-view="calendar">Agenda</button>
                <button class="nav-item" data-view="clients">Clientes</button>
                <button class="nav-item" data-view="services">Serviços</button>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h1 id="page-title">Painel</h1>
                <div class="actions">
                    <button class="btn btn-primary" id="btn-new-appointment"><i class="ph ph-plus"></i> Nova Marcação</button>
                </div>
            </header>
            <div id="content-area" class="content-area"></div>
        </main>
    </div>

    <div class="modal-overlay" id="modal-overlay">
        <!-- Agendamento -->
        <div class="modal" id="appointment-modal" style="display:none; background:white; padding:20px; border-radius:12px; max-width:500px; margin:auto;">
            <h3>Marcação</h3>
            <form id="appointment-form">
                <input type="hidden" id="appt-id">
                <div class="form-group"><label>Nome</label><input id="appt-name" required list="client-list"></div>
                <datalist id="client-list"></datalist>
                <div class="form-group"><label>Data</label><input type="date" id="appt-date" required></div>
                <div class="form-group"><label>Hora</label><input type="time" id="appt-time" required></div>
                <button type="submit" class="btn btn-primary">Guardar</button>
                <button type="button" class="btn close-modal">Fechar</button>
            </form>
        </div>

        <!-- Cliente -->
        <div class="modal" id="client-modal" style="display:none; background:white; padding:20px; border-radius:12px; max-width:500px; margin:auto;">
            <h3>Cliente</h3>
            <form id="client-form">
                <input type="hidden" id="client-id">
                <div class="form-group"><label>Nome</label><input id="client-name" required></div>
                <div class="form-group"><label>Telefone</label><input id="client-phone"></div>
                <button type="submit" class="btn btn-primary">Guardar</button>
                <button type="button" class="btn close-modal">Fechar</button>
            </form>
        </div>

        <!-- Serviço -->
        <div class="modal" id="service-modal" style="display:none; background:white; padding:20px; border-radius:12px; max-width:500px; margin:auto;">
            <h3>Serviço</h3>
            <form id="service-form">
                <input type="hidden" id="service-id">
                <div class="form-group"><label>Nome</label><input id="service-name" required></div>
                <div class="form-group"><label>Preço</label><input id="service-price" type="number" step="0.01"></div>
                <button type="submit" class="btn btn-primary">Guardar</button>
                <button type="button" class="btn close-modal">Fechar</button>
            </form>
        </div>

        <!-- Mensagem -->
        <div class="modal" id="message-modal" style="display:none; background:white; padding:20px; border-radius:12px; max-width:500px; margin:auto;">
            <h3>Enviar Mensagem</h3>
            <input type="text" id="msg-recipient" readonly>
            <input type="hidden" id="msg-phone-hidden">
            <textarea id="msg-content" rows="4" style="width:100%; margin:10px 0;"></textarea>
            <button class="btn" style="background:#25D366; color:white; width:100%;" onclick="window.doSendWA()">Enviar WhatsApp</button>
            <button type="button" class="btn close-modal" style="width:100%; margin-top:5px;">Fechar</button>
        </div>
    </div>

    <div id="notification-container"></div>
    <script>
        window.doSendWA = function() {
            var phone = document.getElementById('msg-phone-hidden').value.replace(/\D/g, '');
            var msg = document.getElementById('msg-content').value;
            window.open('https://wa.me/351' + phone + '?text=' + encodeURIComponent(msg));
        };
    </script>
    <script src="script.js?v=24"></script>
</body>
</html>
