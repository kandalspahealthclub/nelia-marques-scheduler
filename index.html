<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nélia Marques</title>
    <!-- Favicon e ícone da app -->
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Nélia Marques">
    <meta name="theme-color" content="#ede8f5">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <link rel="stylesheet" href="styles.css?v=2">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="brand" style="cursor: pointer;" onclick="state.currentView='dashboard'; saveState(); refreshCurrentView();">
                <img src="logo.png" alt="Logo" class="sidebar-logo">
            </div>
            <nav class="nav-menu">
                <button class="nav-item active" data-view="dashboard"><i class="ph ph-squares-four"></i><span>Painel</span></button>
                <button class="nav-item" data-view="calendar"><i class="ph ph-calendar-blank"></i><span>Agenda</span></button>
                <button class="nav-item" data-view="clients"><i class="ph ph-users"></i><span>Clientes</span></button>
                <button class="nav-item" data-view="services"><i class="ph ph-briefcase"></i><span>Serviços</span></button>
                <button class="nav-item" data-view="birthdays"><i class="ph ph-cake"></i><span>Aniversários</span></button>
                <button class="nav-item" data-view="massmsg"><i class="ph ph-paper-plane-tilt"></i><span>Mensagens</span></button>
                <button class="nav-item" data-view="backup"><i class="ph ph-shield-check"></i><span>Backup</span></button>
            </nav>


        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h1 id="page-title">Painel</h1>
                <div class="actions">
                    <button class="btn btn-primary" id="btn-new-appointment">
                        <i class="ph ph-plus"></i> Nova Marcação
                    </button>
                    <!-- Dedicated button for new service, hidden by default unless in Service View -->
                    <button class="btn btn-primary" id="btn-new-service" style="display: none;">
                        <i class="ph ph-plus"></i> Novo Serviço
                    </button>
                    <button class="btn btn-primary" id="btn-new-client" style="display: none;">
                        <i class="ph ph-plus"></i> Novo Cliente
                    </button>
                </div>
            </header>

            <div id="search-zone" style="display: none; padding: 0 2rem 1rem 2rem;">
                <div id="search-container" style="max-width: 400px;">
                    <div style="position: relative; display: flex; align-items: center;">
                        <i class="ph ph-magnifying-glass"
                            style="position: absolute; left: 12px; color: var(--text-tertiary);"></i>
                        <input type="text" id="client-search" placeholder="Pesquisar clientes..."
                            style="width: 100%; padding: 10px 12px 10px 38px; border: 1px solid var(--border-color); border-radius: 10px; font-size: 0.9rem; background: var(--bg-card); transition: all 0.2s;">
                    </div>
                </div>
            </div>

            <div id="content-area" class="content-area">
                <!-- Content injected via JS -->
            </div>
        </main>
    </div>

    <!-- Modals Overlay -->
    <div class="modal-overlay" id="modal-overlay">

        <!-- Appointment Modal -->
        <div class="modal" id="appointment-modal">
            <div class="modal-header">
                <h3 id="modal-title">Nova Marcação</h3>
                <button type="button" class="close-modal"><i class="ph ph-x"></i></button>
            </div>
            <div class="modal-body">
                <form id="appointment-form">
                    <input type="hidden" id="appt-id">
                    <div class="form-group">
                        <label>Cliente</label>
                        <div style="display: flex; gap: 0.5rem; align-items: center;">
                            <div style="position: relative; flex: 1;">
                                <input type="text" id="appt-name" required
                                    placeholder="Escreva o nome do cliente..." autocomplete="off"
                                    style="width: 100%;">
                                <div id="appt-name-dropdown"
                                    style="display:none; position:absolute; top:100%; left:0; right:0; background:white;
                                           border:1.5px solid var(--accent); border-top:none; border-radius:0 0 12px 12px;
                                           max-height:200px; overflow-y:auto; z-index:100; box-shadow:0 8px 16px rgba(0,0,0,0.1);">
                                </div>
                            </div>
                            <button type="button" class="btn btn-ghost" id="btn-quick-add-client" title="Novo Cliente"
                                style="padding: 6px; aspect-ratio: 1/1; border: 1px solid var(--border-color); border-radius: 8px;">
                                <i class="ph ph-user-plus" style="font-size: 1.2rem;"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Data</label>
                            <input type="date" id="appt-date" required>
                        </div>
                        <div class="form-group">
                            <label>Horário</label>
                            <input type="time" id="appt-time" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Serviços</label>
                        <div id="selected-services-container"
                            style="display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.5rem;">
                            <!-- Selected services will appear here -->
                        </div>
                        <div style="display: flex; gap: 0.5rem; align-items: center;">
                            <select id="appt-type" style="flex: 1;">
                                <!-- Options populated dynamically -->
                            </select>
                            <button type="button" class="btn btn-ghost" id="btn-add-service-to-appt"
                                title="Adicionar Serviço"
                                style="padding: 6px; aspect-ratio: 1/1; border: 1px solid var(--border-color); border-radius: 8px;">
                                <i class="ph ph-plus" style="font-size: 1.2rem;"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-ghost close-modal-btn">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Guardar</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Client Modal -->
        <div class="modal" id="client-modal">
            <div class="modal-header">
                <h3>Editar Cliente</h3>
                <button type="button" class="close-modal-client"><i class="ph ph-x"></i></button>
            </div>
            <div class="modal-body">
                <form id="client-form">
                    <input type="hidden" id="client-id">
                    <div class="form-group">
                        <label>Nome Completo</label>
                        <input type="text" id="client-name" required>
                    </div>
                    <div class="form-group">
                        <label>Telefone</label>
                        <input type="tel" id="client-phone" placeholder="(11) 99999-9999" required>
                    </div>
                    <div class="form-group">
                        <label>Data de Nascimento</label>
                        <input type="date" id="client-birthdate">
                    </div>
                    <div class="form-group">
                        <label>Observações</label>
                        <textarea id="client-observations" rows="3" placeholder="Notas sobre o cliente..."></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-ghost close-client-btn">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Guardar Alterações</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Service Modal -->
        <div class="modal" id="service-modal">
            <div class="modal-header">
                <h3 id="service-modal-title">Novo Serviço</h3>
                <button type="button" class="close-modal-service"><i class="ph ph-x"></i></button>
            </div>
            <div class="modal-body">
                <form id="service-form">
                    <input type="hidden" id="service-id">
                    <div class="form-group">
                        <label>Nome do Serviço</label>
                        <input type="text" id="service-name" required placeholder="Ex: Unhas, Cabelo...">
                    </div>
                    <div class="form-group">
                        <label>Preço (€)</label>
                        <input type="number" id="service-price" placeholder="0" step="0.01">
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-ghost close-service-btn">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Guardar Serviço</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Message Modal -->
        <div class="modal" id="message-modal">
            <div class="modal-header">
                <h3>Enviar Mensagem</h3>
                <button type="button" class="close-modal-msg"><i class="ph ph-x"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Para</label>
                    <input type="text" id="msg-recipient" readonly style="background-color: var(--bg-hover);">
                    <input type="hidden" id="msg-phone-hidden">
                </div>
                <div class="form-group">
                    <label>Mensagem</label>
                    <textarea id="msg-content" rows="4" placeholder="Digite sua mensagem aqui..." required></textarea>
                </div>

                <div style="margin-top: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem;">
                    <!-- Added WhatsApp back -->
                    <button id="btn-send-whatsapp" class="btn"
                        style="background: #25D366; color: white; width: 100%; justify-content: center; border:none;">
                        <i class="ph ph-whatsapp-logo" style="font-size: 1.2rem;"></i> Enviar via WhatsApp
                    </button>

                    <button id="btn-send-sms" class="btn"
                        style="background: #3b82f6; color: white; width: 100%; justify-content: center; border:none;">
                        <i class="ph ph-chat-text" style="font-size: 1.2rem;"></i> Enviar via SMS (Móvel)
                    </button>
                    <button id="btn-save-log" class="btn"
                        style="background: var(--bg-hover); color: var(--text-primary); width: 100%; justify-content: center; border: 1px solid var(--border-color);">
                        <i class="ph ph-floppy-disk" style="font-size: 1.2rem;"></i> Apenas Guardar (Interno)
                    </button>
                </div>

                <div class="form-actions" style="margin-top: 1rem; justify-content: center;">
                    <button type="button" class="btn btn-ghost close-msg-btn">Fechar</button>
                </div>
            </div>
        </div>

        <!-- Confirm Modal -->
        <div class="modal" id="confirm-modal" style="max-width: 400px; text-align: center; padding: 2rem;">
            <div style="margin-bottom: 1.5rem;">
                <i class="ph ph-warning-circle" style="font-size: 3.5rem; color: var(--danger);"></i>
            </div>
            <h3 style="margin-bottom: 1rem; font-family: var(--font-heading);">Confirmar</h3>
            <p id="confirm-msg" style="color: var(--text-secondary); margin-bottom: 2rem;">Tem a certeza que deseja eliminar?</p>
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button type="button" class="btn btn-ghost" id="confirm-no" style="flex: 1;">Cancelar</button>
                <button type="button" class="btn btn-primary" id="confirm-yes" style="flex: 1; background: var(--danger);">Eliminar</button>
            </div>
        </div>

    </div>

    <div class="notification-container" id="notification-container"></div>

    <script src="script.js?v=18"></script>
</body>

</html>
